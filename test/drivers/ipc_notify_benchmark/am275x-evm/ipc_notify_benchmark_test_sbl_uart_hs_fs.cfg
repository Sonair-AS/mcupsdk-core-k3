#-----------------------------------------------------------------------------#
#                                                                             #
#      DEFAULT CONFIGURATION FILE TO BE USED WITH THE BOOTLOADER SCRIPT      #
#                                                                             #
#-----------------------------------------------------------------------------#
#
# By default this config file,
# - points to sbl uart bootloader for this EVM
# - points to sciserver appimage for the DMR5
# - The application image points to relative path of the ipc rpmsg linux application image for this EVM
#   - Make sure this application is built before running this script
# - You can customized this config file to point to your application images
#

# Mention the soc name for am275x
--soc=am275x

# First point to sbl_uart binary, which function's as a server to receive application images of other cores through uart
--bootloader=sbl_prebuilt/am275x-evm/sbl_uart.release.hs_fs.tiimage

# This is example appimage which will be loaded to the R50-0 core
--file=../../test/drivers/ipc_notify_benchmark/am275x-evm/r5fss0-0_freertos/ti-arm-clang/test_ipc_notify_benchmark.release.mcelf.hs_fs

# This is example appimage which will be loaded to the R50-1 core
--file=../../test/drivers/ipc_notify_benchmark/am275x-evm/r5fss0-1_freertos/ti-arm-clang/test_ipc_notify_benchmark.release.mcelf.hs_fs

# This is example appimage which will be loaded to the R51-0 core
--file=../../test/drivers/ipc_notify_benchmark/am275x-evm/r5fss1-0_freertos/ti-arm-clang/test_ipc_notify_benchmark.release.mcelf.hs_fs

# This is example appimage which will be loaded to the R51-1 core
--file=../../test/drivers/ipc_notify_benchmark/am275x-evm/r5fss1-1_freertos/ti-arm-clang/test_ipc_notify_benchmark.release.mcelf.hs_fs

# This is example appimage which will be loaded to the c75ss0-0 core
--file=../../test/drivers/ipc_notify_benchmark/am275x-evm/c75ss0-0_freertos/ti-c7000/test_ipc_notify_benchmark.release.mcelf.hs_fs

# This is example appimage which will be loaded to the c75ss1-0 core
--file=../../test/drivers/ipc_notify_benchmark/am275x-evm/c75ss1-0_freertos/ti-c7000/test_ipc_notify_benchmark.release.mcelf.hs_fs

